defaults:
  - default
  - algorithm: gflownet_tb
  - override encoder: gcn
  - _self_

run_name: gflownet_tb_mcnc
dataset_cfg: cfg/data/mcnc_zhu10.yaml

policy:
  type: reinforce

encoder:
  num_layers: 4
  pooling: mean

head:
  type: mlp
  hidden_dims: [128, 64]

reward:
  type: zhu_size

num_steps: 20
episodes: 200
eval_every: 50
train_ratio: 0.75
seed: 0
learning_rate: 0.001

paper_mode:
  per_circuit_mode: true
  num_runs: 10
  infer_rollouts: 4

json_out: ${output_dir}/gflownet_tb_report.json
