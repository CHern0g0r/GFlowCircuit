defaults:
  - default
  - environment: default
  - algorithm: modrl_ppo
  - override encoder: hybrid_zhu
  - _self_

run_name: smoke_modrl_ppo
dataset_cfg: cfg/data/smoke_mcnc_two.yaml

policy:
  type: reinforce
head:
  type: mlp
  hidden_dims: [16]
value:
  type: mlp
  input: zhu10
  hidden_dims: [16]

reward:
  type: zhu_size

mo_reward:
  type: size_depth_improvement
  normalize: true
  objectives: [size, depth]
  objective_dim: 2

episodes: 2
eval_every: 1
learning_rate: 0.001
gamma: 1.0
baseline: zhu_resyn2
baseline_scale: 1.0

modrl_ppo:
  rollout_steps: 4
  ppo_epochs: 1
  minibatch_size: 4
  clip_eps: 0.2
  value_loss_coef: 0.5
  entropy_beta: 0.0
  normalize_advantages: true
  clip_grad_norm: null
  gae_lambda: 0.95
  preferences:
    - id: linear_balanced
      mode: linear
      weights: [0.5, 0.5]
    - id: tlo_depth_005_size
      mode: tlo
      constraint_objective: depth
      optimize_objective: size
      threshold: 0.05
      lex_scale: 10.0

paper_mode:
  per_circuit_mode: true
  num_runs: 1
  infer_rollouts: 1

json_out: ${output_dir}/smoke_modrl_ppo_report.json

