defaults:
  - default
  - environment: default
  - algorithm: gflownet_tb
  - override encoder: hybrid_zhu
  - _self_

run_name: tbzhuLinear
dataset_cfg: cfg/data/zhu2020/i10.yaml

policy:
  type: reinforce

head:
  type: mlp
  hidden_dims: [32]

reward:
  type: linear
  c_size: 0.5
  c_depth: 0.5

episodes: 200
eval_every: 50
train_ratio: 0.75
seed: 0
learning_rate: 0.001

tb:
  trajectories_per_episode: 4
  reward_alpha: 4.0
  reward_eps: 1.0e-8
  reward_improvement_clip: 2.0
  log_z_learning_rate: null

paper_mode:
  per_circuit_mode: true
  num_runs: 10
  infer_rollouts: 10

json_out: ${output_dir}/gflownet_tb_report.json
