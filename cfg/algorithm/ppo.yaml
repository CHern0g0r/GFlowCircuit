name: ppo
ppo:
  # Four complete 20-step trajectories per training iteration, matching
  # GFlowNet's trajectories_per_episode. PPO collects whole trajectories until
  # this transition count is reached.
  rollout_steps: 80
  ppo_epochs: 20
  minibatch_size: 64
  clip_eps: 0.2
  value_loss_coef: 0.5
  entropy_beta: 0.0
  normalize_advantages: true
  clip_grad_norm: null
  gae_lambda: 0.95
